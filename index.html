<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE DATAS 2.0 PREMIUM LUXE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chaos-container">
        <h1>SELECIONE A DATA (POR FAVOR, NÃO CORRA)</h1>
        
        <div class="display">
            DATA ATUAL: <span id="data-display">01 / 01 / 1900</span>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>VELOCIDADE DO DIA:</label>
                <input type="range" id="speed-slider" min="1" max="100" value="50">
            </div>

            <button id="btn-stop" class="evil-button">PARAR NO DIA CERTO</button>
        </div>

        <div class="manual-entry">
            <p>OU USE NOSSO SELETOR MANUAL:</p>
            <button id="btn-random" class="jump-button">DIA ALEATÓRIO</button>
        </div>

        <button id="btn-submit" onclick="alert('Erro: O fuso horário de Marte não foi detectado.')">CONFIRMAR AGENDAMENTO</button>
    </div>

    <script src="controller.js"></script>
</body>
</html>
